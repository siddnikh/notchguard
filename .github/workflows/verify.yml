name: Verify

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
      - name: Build universal binary
        run: ./scripts/build-universal.sh
      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: notchguard-macos-universal
          path: dist/notchguard
          if-no-files-found: error
