name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
      - name: Build universal binary
        run: ./scripts/build-universal.sh
      - name: Create checksum
        run: cd dist && shasum -a 256 notchguard > notchguard.sha256
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/notchguard
          dist/notchguard.sha256
          --repo "$GITHUB_REPOSITORY"
          --generate-notes
          --verify-tag
